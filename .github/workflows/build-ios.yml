name: Build Physical iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Expo Prebuild (Generate Native iOS Project)
        run: npx expo prebuild --platform ios

      - name: Bundle React Native JS & Assets
        run: |
          npx expo export:embed --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios/assets

      - name: Build Unsigned Physical ARM64 iOS App (SKIP_BUNDLING=1)
        run: |
          export NODE_BINARY=$(which node)
          cd ios
          xcodebuild -workspace LiveLocation.xcworkspace \
                     -scheme LiveLocation \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     SKIP_BUNDLING=1

      - name: Package IPA with Embedded Bundle for iLoader
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/LiveLocation.app Payload/
          cp ios/main.jsbundle Payload/LiveLocation.app/main.jsbundle
          cp -r ios/assets Payload/LiveLocation.app/ 2>/dev/null || true
          zip -r LiveLocation.ipa Payload

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveLocation-iOS-Physical-IPA
          path: LiveLocation.ipa
