name: Build Physical iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Symlink Node to System Path for Xcode
        run: |
          NODE_PATH=$(which node)
          NPX_PATH=$(which npx)
          sudo mkdir -p /usr/local/bin
          sudo ln -sf $NODE_PATH /usr/local/bin/node
          sudo ln -sf $NPX_PATH /usr/local/bin/npx
          echo "Node verified at: $(/usr/local/bin/node -v)"

      - name: Run Expo Prebuild (Generate Native iOS Project)
        run: npx expo prebuild --platform ios

      - name: Configure Xcode Node Environment File
        run: |
          echo "export NODE_BINARY=/usr/local/bin/node" > ios/.xcode.env
          echo "export NODE_BINARY=/usr/local/bin/node" > ios/.xcode.env.local
          echo "export PATH=/usr/local/bin:\$PATH" >> ios/.xcode.env
          echo "export PATH=/usr/local/bin:\$PATH" >> ios/.xcode.env.local
          cat ios/.xcode.env

      - name: Build Unsigned Physical ARM64 iOS App
        run: |
          export NODE_BINARY=/usr/local/bin/node
          export PATH=/usr/local/bin:$PATH
          cd ios
          xcodebuild -workspace LiveLocation.xcworkspace \
                     -scheme LiveLocation \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     ENTRY_FILE="index.js" \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Package IPA for iLoader / Sideloadly
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/LiveLocation.app Payload/
          zip -r LiveLocation.ipa Payload

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveLocation-iOS-Physical-IPA
          path: LiveLocation.ipa
