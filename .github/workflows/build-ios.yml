name: Build Physical iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Symlink Node & Ensure Hermes Compiler Permissions
        run: |
          NODE_PATH=$(which node)
          NPX_PATH=$(which npx)
          sudo mkdir -p /usr/local/bin
          sudo ln -sf $NODE_PATH /usr/local/bin/node
          sudo ln -sf $NPX_PATH /usr/local/bin/npx
          chmod -R +x node_modules/.bin 2>/dev/null || true
          chmod -R +x node_modules/react-native/sdks/hermesc/osx-bin/ 2>/dev/null || true
          echo "Node verified at: $(/usr/local/bin/node -v)"
          echo "Hermes binary exists at: $(ls -l node_modules/react-native/sdks/hermesc/osx-bin/hermesc)"

      - name: Run Expo Prebuild (Generate Native iOS Project)
        run: npx expo prebuild --platform ios

      - name: Configure Xcode Environment Files (Set NODE_BINARY & HERMES_CLI_PATH)
        run: |
          NODE_PATH=/usr/local/bin/node
          HERMES_PATH="$PWD/node_modules/react-native/sdks/hermesc/osx-bin/hermesc"
          
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env
          echo "export HERMES_CLI_PATH=$HERMES_PATH" >> ios/.xcode.env
          echo "export PATH=/usr/local/bin:\$PATH" >> ios/.xcode.env
          
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "export HERMES_CLI_PATH=$HERMES_PATH" >> ios/.xcode.env.local
          echo "export PATH=/usr/local/bin:\$PATH" >> ios/.xcode.env.local
          
          chmod +x ios/.xcode.env ios/.xcode.env.local
          cat ios/.xcode.env

      - name: Build Unsigned Physical ARM64 iOS App
        run: |
          export NODE_BINARY=/usr/local/bin/node
          export HERMES_CLI_PATH="$PWD/node_modules/react-native/sdks/hermesc/osx-bin/hermesc"
          export PATH=/usr/local/bin:$PATH
          cd ios
          
          set -o pipefail
          xcodebuild -workspace LiveLocation.xcworkspace \
                     -scheme LiveLocation \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     ENTRY_FILE="index.js" \
                     HERMES_CLI_PATH="$HERMES_CLI_PATH" \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log || {
                       echo "=== XCODEBUILD FAILED - PRINTING EXACT ERROR LOGS FROM xcodebuild.log ==="
                       grep -C 20 -i "error:" xcodebuild.log || tail -n 150 xcodebuild.log
                       exit 1
                     }

      - name: Package IPA for iLoader / Sideloadly
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/LiveLocation.app Payload/
          zip -r LiveLocation.ipa Payload

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveLocation-iOS-Physical-IPA
          path: LiveLocation.ipa
